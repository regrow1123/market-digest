nas_report_dir: /mnt/nas/market-digest

hankyung:
  enabled: true
  categories: []  # 비어 있으면 전체. 예: [company, industry, market]
  request_interval_sec: 4
  user_agent: "market-digest/0.1 (+personal-use)"
  max_reports: 40  # 하루 상한 (PDF 다운로드 부하 방지)

sec_edgar:
  enabled: true
  form_types: ["8-K"]
  max_items: 30

fmp:
  enabled: true
  min_market_cap_usd: 1000000000
  target_change_threshold: 0.10   # 10%; used only when targets are present
  page_limit: 3                   # pages of feed to fetch (100 records each)
  request_interval_sec: 1

# watchlist is still consumed by sec_edgar; keep it at the top level
watchlist:
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - AMZN
  - META
  - TSLA
  - AVGO
  - AMD
  - TSM

claude:
  cli_path: /home/sund4y/.local/bin/claude
  allowed_tools: "Read,Write,Glob"
  permission_mode: dontAsk
  timeout_sec: 900          # subprocess timeout (15 min)
  max_budget_usd: null      # e.g. 1.0 to cap per-run cost
  blurb_model: "claude-sonnet-4-6"
  research_model: "claude-opus-4-7"
  blurb_cache_ttl_days: 90
